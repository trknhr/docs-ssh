services:
  docs-ssh:
    build: .
    container_name: docs-ssh
    init: true
    ports:
      - "${DOCS_SSH_BIND_IP:-127.0.0.1}:${DOCS_SSH_PORT:-2222}:2222"
      - "${DOCS_SSH_VIEWER_BIND_IP:-127.0.0.1}:${DOCS_SSH_VIEWER_PORT:-3000}:3000"
    environment:
      SSH_HOST: 0.0.0.0
      SSH_PORT: 2222
      VIEWER_HOST: 0.0.0.0
      VIEWER_PORT: 3000
      DOCS_DIR: /data/docs
      DOCS_SSH_STATE_DIR: /data/state
      WORKSPACE_DIR: /data/workspace
      SSH_HOST_KEY_PATH: /data/state/ssh_host_key
    volumes:
      - ${DOCS_SSH_DOCS_DIR:-./docs}:/data/docs:ro
      - ${DOCS_SSH_STATE_DIR:-./var/state}:/data/state
      - ${DOCS_SSH_WORKSPACE_DIR:-./var/workspace}:/data/workspace
    restart: unless-stopped
